name: cad-converter

services:
  # 后端转换服务
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cad-converter-backend
    ports:
      - "5000:5000"
    volumes:
      - cad_uploads:/tmp/cad_converter
      - ./server/uploads:/app/uploads
      - ./server/converted:/app/converted
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - UPLOAD_FOLDER=/app/uploads
      - CONVERTED_FOLDER=/app/converted
    restart: unless-stopped
    networks:
      - cad-network

  # 前端静态文件服务
  frontend:
    image: nginx:alpine
    container_name: cad-converter-frontend
    ports:
      - "80:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - cad-network

volumes:
  cad_uploads:
    driver: local

networks:
  cad-network:
    driver: bridge
